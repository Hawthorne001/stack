spec-version: 0.36.0

# Only builds if this package name comes before myPackageA, alphabetically!
name: 0myPackageB

dependencies:
- base

library:
  exposed-modules:
  - Cyclic

tests:
  cyclic-test-suite:
    main: Spec.hs
    dependencies:
    - myPackageA
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
